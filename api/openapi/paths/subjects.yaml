# Path items for /subjects. Referenced from ../openapi.yaml.
/subjects:
  get:
    tags: [subjects]
    summary: List all subjects
    operationId: listSubjects
    responses:
      "200":
        description: All subjects
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                subjects:
                  type: array
                  items:
                    $ref: "../components/schemas/subjects/SubjectListItem.yaml"
              required: [subjects]

/subjects/{slug}:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: math
  get:
    tags: [subjects]
    summary: Get subject metadata
    description: Subject metadata only; the tagged guide list is a separate call.
    operationId: getSubject
    responses:
      "200":
        description: The subject
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                subject:
                  $ref: "../components/schemas/subjects/Subject.yaml"
              required: [subject]
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/subjects/{slug}/guides:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: math
  get:
    tags: [subjects]
    summary: List guides tagged with this subject
    description: Alphabetical list of guides carrying this subject tag.
    operationId: listSubjectGuides
    responses:
      "200":
        description: Tagged guides
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                guides:
                  type: array
                  items:
                    $ref: "../components/schemas/guides/GuideListItem.yaml"
              required: [guides]
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"

/subjects/{slug}/objectives:
  parameters:
    - name: slug
      in: path
      required: true
      schema:
        type: string
      example: math
  get:
    tags: [subjects]
    summary: List objectives tagged with this subject
    description: Alphabetical list of published objectives carrying this subject tag.
    operationId: listSubjectObjectives
    responses:
      "200":
        description: Tagged objectives
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                objectives:
                  type: array
                  items:
                    $ref: "../components/schemas/objectives/ObjectiveListItem.yaml"
              required: [objectives]
      "404":
        $ref: "../components/responses/_shared.yaml#/NotFound"
